
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ラッキーラビット | ポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="data.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Alfa+Slab+One&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; }
        .logo-font { font-family: 'Alfa Slab One', serif; letter-spacing: -0.02em; }
        .rabbit-hop { animation: hop 2s infinite; }
        @keyframes hop { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .bg-rabbit { background-color: #0066cc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .accordion-content { transition: max-height 0.3s ease-out; overflow: hidden; max-height: 0; }
        .accordion-content.open { max-height: 2000px; }
        .tab-btn { transition: all 0.2s ease; font-size: 7px; }
        @media (min-width: 640px) { .tab-btn { font-size: 10px; } }
    </style>
</head>
<body class="bg-blue-50 text-slate-800 pb-20">

    <header class="bg-rabbit text-white pb-10 pt-6 px-4 rounded-b-[2.5rem] shadow-xl text-center relative overflow-hidden">
        <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center mx-auto mb-2 rabbit-hop shadow-inner">
            <span class="text-2xl">🐰</span>
        </div>
        <h1 class="logo-font text-3xl md:text-5xl mb-1 drop-shadow-lg text-white">Lucky Rabbit</h1>
        <p class="text-[8px] font-bold opacity-90 tracking-widest bg-blue-800/40 inline-block px-3 py-0.5 rounded-full">KUKI CITY VOLLEYBALL CLUB</p>
    </header>

    <!-- Navigation (6つのタブ) -->
    <nav class="max-w-md mx-auto -mt-6 px-1 grid grid-cols-6 gap-0.5 z-10 relative">
        <button onclick="showTab('kids')" id="btn-kids" class="tab-btn bg-white p-1.5 rounded-xl shadow-md border-b-4 border-amber-400 flex flex-col items-center">
            <span class="text-base">👧</span><span class="font-bold">キッズ</span>
        </button>
        <button onclick="showTab('parents')" id="btn-parents" class="tab-btn bg-white p-1.5 rounded-xl shadow-md border-b-4 border-transparent opacity-60 flex flex-col items-center">
            <span class="text-base">👩‍🏫</span><span class="font-bold">保護者</span>
        </button>
        <button onclick="showTab('duty')" id="btn-duty" class="tab-btn bg-white p-1.5 rounded-xl shadow-md border-b-4 border-transparent opacity-60 flex flex-col items-center">
            <span class="text-base">🤝</span><span class="font-bold">当番</span>
        </button>
        <button onclick="showTab('ops')" id="btn-ops" class="tab-btn bg-white p-1.5 rounded-xl shadow-md border-b-4 border-transparent opacity-60 flex flex-col items-center">
            <span class="text-base">📋</span><span class="font-bold">運営</span>
        </button>
        <button onclick="showTab('rules')" id="btn-rules" class="tab-btn bg-white p-1.5 rounded-xl shadow-md border-b-4 border-transparent opacity-60 flex flex-col items-center">
            <span class="text-base">🏐</span><span class="font-bold">ルール</span>
        </button>
        <button onclick="showTab('gym')" id="btn-gym" class="tab-btn bg-white p-1.5 rounded-xl shadow-md border-b-4 border-transparent opacity-60 flex flex-col items-center">
            <span class="text-base">🏫</span><span class="font-bold">体育館</span>
        </button>
    </nav>

    <main class="max-w-md mx-auto p-4 mt-4 min-h-[50vh]">
        <div id="content-area"></div>
    </main>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.add('opacity-60');
                btn.classList.replace('border-amber-400', 'border-transparent');
                btn.classList.remove('scale-105');
            });
            const activeBtn = document.getElementById('btn-' + tabId);
            activeBtn.classList.remove('opacity-60');
            activeBtn.classList.replace('border-transparent', 'border-amber-400');
            activeBtn.classList.add('scale-105');

            const container = document.getElementById('content-area');
            let html = '';

            if (tabId === 'kids') {
                html = `<h2 class="text-lg font-black text-center mb-4 text-blue-800">ラビッ子の目標！</h2>`;
                rabbitData.kidsGoals.forEach(g => {
                    html += `<div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-${g.color}-400 mb-3"><h3 class="font-bold text-sm mb-1">${g.icon} ${g.title}</h3><ul class="text-xs text-slate-600 space-y-0.5">${g.items.map(i => `<li>・${i}</li>`).join('')}</ul></div>`;
                });
            } else if (tabId === 'parents') {
                html = `<h2 class="text-lg font-black text-center mb-4 text-blue-800">指導方針と規約</h2>`;
                rabbitData.policies.forEach(p => {
                    html += `<div class="bg-white rounded-xl shadow-sm border mb-3 overflow-hidden"><button onclick="this.nextElementSibling.classList.toggle('open')" class="w-full p-3 text-left font-bold bg-slate-50 flex justify-between text-sm"><span>${p.icon} ${p.title}</span><span>＋</span></button><div class="accordion-content"><div class="p-3 text-xs text-slate-600 space-y-1 border-t">${p.content.map(c => `<p>・${c}</p>`).join('')}</div></div></div>`;
                });
            } else if (tabId === 'duty') {
                html = `<h2 class="text-lg font-black text-center mb-4 text-blue-800">当番のお仕事 見える化</h2>
                        <div class="space-y-6">
                            <div class="bg-white p-5 rounded-3xl shadow-md border-t-8 border-amber-400">
                                <h3 class="font-black text-amber-700 mb-3 flex items-center"><span class="mr-2">🏠</span> 練習のとき</h3>
                                <ul class="space-y-3">
                                    ${rabbitData.dutyTasks.practice.map(item => `
                                        <li class="flex items-start gap-3">
                                            <span class="mt-1 w-4 h-4 border-2 border-amber-200 rounded-full shrink-0 flex items-center justify-center text-[8px]">✓</span>
                                            <div><p class="font-bold text-xs text-slate-800">${item.task}</p><p class="text-[10px] text-slate-500">${item.note}</p></div>
                                        </li>`).join('')}
                                </ul>
                            </div>
                            <div class="bg-white p-5 rounded-3xl shadow-md border-t-8 border-blue-500">
                                <h3 class="font-black text-blue-700 mb-3 flex items-center"><span class="mr-2">🏆</span> 試合のとき</h3>
                                <ul class="space-y-3">
                                    ${rabbitData.dutyTasks.game.map(item => `
                                        <li class="flex items-start gap-3">
                                            <span class="mt-1 w-4 h-4 border-2 border-blue-200 rounded-full shrink-0 flex items-center justify-center text-[8px]">✓</span>
                                            <div><p class="font-bold text-xs text-slate-800">${item.task}</p><p class="text-[10px] text-slate-500">${item.note}</p></div>
                                        </li>`).join('')}
                                </ul>
                            </div>
                        </div>`;
            } else if (tabId === 'ops') {
                html = `<h2 class="text-lg font-black text-center mb-4 text-blue-800">運営・アプリガイド</h2>
                        <div class="bg-indigo-600 p-5 rounded-2xl text-white mb-4 shadow-lg"><h3 class="font-bold mb-2 text-xs flex items-center">📱 TeamHubの使い方</h3><ul class="text-[10px] space-y-1">${rabbitData.operations.teamhub.map(t => `<li>・${t}</li>`).join('')}</ul></div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="bg-white p-3 rounded-xl shadow-sm border-t-4 border-blue-500"><h4 class="font-bold text-[10px] mb-1 text-blue-700">🚗 配車</h4><ul class="text-[8px] space-y-0.5 text-slate-600">${rabbitData.operations.carpool.map(c => `<li>・${c}</li>`).join('')}</ul></div>
                            <div class="bg-white p-3 rounded-xl shadow-sm border-t-4 border-emerald-500"><h4 class="font-bold text-[10px] mb-1 text-emerald-700">💰 会計</h4><ul class="text-[8px] space-y-0.5 text-slate-600">${rabbitData.operations.accounting.map(a => `<li>・${a}</li>`).join('')}</ul></div>
                        </div>`;
            } else if (tabId === 'rules') {
                html = `<h2 class="text-lg font-black text-center mb-4 text-blue-800">バレーのルール</h2>`;
                rabbitData.volleyballRules.forEach(r => {
                    html += `<div class="bg-white p-4 rounded-2xl shadow-sm mb-3 border-b-2 border-blue-100"><p class="font-bold text-blue-700 text-xs mb-0.5">Q. ${r.q}</p><p class="text-xs text-slate-600">A. ${r.a}</p></div>`;
                });
            } else if (tabId === 'gym') {
                html = `<h2 class="text-lg font-black text-center mb-4 text-blue-800">体育館の利用</h2><div class="bg-rose-50 p-3 rounded-xl mb-4 text-[9px] text-rose-800 italic">⚠️ ${rabbitData.gymRules.notice}</div><div class="space-y-2">`;
                rabbitData.gymRules.items.forEach(item => {
                    html += `<div class="bg-white p-3 rounded-xl shadow-sm flex items-start gap-2 border border-slate-100"><span class="bg-blue-100 text-blue-800 px-1.5 py-0.5 rounded text-[7px] font-bold mt-0.5">Must</span><div><h4 class="font-bold text-xs text-slate-800">${item.title}</h4><p class="text-[10px] text-slate-500 leading-tight">${item.desc}</p></div></div>`;
                });
                html += `</div>`;
            }

            container.innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = () => showTab('kids');
    </script>
</body>
</html>
