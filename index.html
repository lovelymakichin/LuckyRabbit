<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ラッキーラビット | ポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 外部のデータファイルを読み込む -->
    <script src="data.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; }
        .rabbit-hop { animation: hop 2s infinite; }
        @keyframes hop { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .bg-rabbit { background-color: #0066cc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .accordion-content { transition: max-height 0.3s ease-out; overflow: hidden; max-height: 0; }
        .accordion-content.open { max-height: 2000px; }
    </style>
</head>
<body class="bg-blue-50 text-slate-800 pb-20">

    <header class="bg-rabbit text-white pb-12 pt-8 px-6 rounded-b-[3rem] shadow-xl text-center relative overflow-hidden">
        <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto mb-4 rabbit-hop">
            <span class="text-3xl">🐰</span>
        </div>
        <h1 class="text-3xl font-black mb-1">LUCKY RABBIT</h1>
        <p class="text-xs opacity-80">久喜市ラッキーラビット・デジタルポータル</p>
    </header>

    <!-- Navigation -->
    <nav class="max-w-md mx-auto -mt-6 px-4 grid grid-cols-4 gap-2 z-10 relative">
        <button onclick="showTab('kids')" id="btn-kids" class="tab-btn bg-white p-3 rounded-2xl shadow-md border-b-4 border-amber-400 flex flex-col items-center">
            <span class="text-xl">👧</span><span class="text-[10px] font-bold">キッズ</span>
        </button>
        <button onclick="showTab('parents')" id="btn-parents" class="tab-btn bg-white p-3 rounded-2xl shadow-md border-b-4 border-transparent opacity-60 flex flex-col items-center">
            <span class="text-xl">👩‍🏫</span><span class="text-[10px] font-bold">保護者</span>
        </button>
        <button onclick="showTab('ops')" id="btn-ops" class="tab-btn bg-white p-3 rounded-2xl shadow-md border-b-4 border-transparent opacity-60 flex flex-col items-center">
            <span class="text-xl">📋</span><span class="text-[10px] font-bold">運営</span>
        </button>
        <button onclick="showTab('rules')" id="btn-rules" class="tab-btn bg-white p-3 rounded-2xl shadow-md border-b-4 border-transparent opacity-60 flex flex-col items-center">
            <span class="text-xl">🏐</span><span class="text-[10px] font-bold">ルール</span>
        </button>
    </nav>

    <main class="max-w-md mx-auto p-4 mt-4">
        <!-- 各セクションの入れ物。中身はJSで動的に入れる -->
        <div id="content-area"></div>
    </main>

    <script>
        // タブ切り替えと描画ロジック
        function showTab(tabId) {
            // タブの見た目更新
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.add('opacity-60');
                btn.classList.replace('border-amber-400', 'border-transparent');
            });
            const activeBtn = document.getElementById('btn-' + tabId);
            activeBtn.classList.remove('opacity-60');
            activeBtn.classList.replace('border-transparent', 'border-amber-400');

            const container = document.getElementById('content-area');
            let html = '';

            if (tabId === 'kids') {
                html = `<h2 class="text-xl font-black text-center mb-6 text-blue-800">ラビッ子の目標！</h2>`;
                rabbitData.kidsGoals.forEach(g => {
                    html += `
                        <div class="bg-white p-5 rounded-3xl shadow-sm border-l-8 border-${g.color}-400 mb-4">
                            <h3 class="font-bold flex items-center text-lg mb-2"><span class="mr-2">${g.icon}</span> ${g.title}</h3>
                            <ul class="text-sm text-slate-600 space-y-1">${g.items.map(i => `<li>・${i}</li>`).join('')}</ul>
                        </div>`;
                });
            } else if (tabId === 'parents') {
                html = `<h2 class="text-xl font-black text-center mb-6 text-blue-800">指導方針と規約</h2>`;
                rabbitData.policies.forEach(p => {
                    html += `
                        <div class="bg-white rounded-2xl shadow-sm border mb-4 overflow-hidden">
                            <button onclick="this.nextElementSibling.classList.toggle('open')" class="w-full p-4 text-left font-bold bg-slate-50 flex justify-between">
                                <span>${p.icon} ${p.title}</span><span>＋</span>
                            </button>
                            <div class="accordion-content">
                                <div class="p-4 text-sm text-slate-600 space-y-2">${p.content.map(c => `<p>・${c}</p>`).join('')}</div>
                            </div>
                        </div>`;
                });
            } else if (tabId === 'ops') {
                html = `<h2 class="text-xl font-black text-center mb-6 text-blue-800">運営・アプリガイド</h2>
                        <div class="bg-indigo-600 p-6 rounded-3xl text-white mb-4 shadow-lg">
                            <h3 class="font-bold mb-3 flex items-center"><span class="mr-2">📱</span> TeamHubの使い方</h3>
                            <ul class="text-xs space-y-2">${rabbitData.operations.teamhub.map(t => `<li>・${t}</li>`).join('')}</ul>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-white p-4 rounded-2xl shadow-sm border-t-4 border-blue-500">
                                <h4 class="font-bold text-xs mb-2">🚗 配車・精算</h4>
                                <ul class="text-[10px] space-y-1">${rabbitData.operations.carpool.map(c => `<li>・${c}</li>`).join('')}</ul>
                            </div>
                            <div class="bg-white p-4 rounded-2xl shadow-sm border-t-4 border-emerald-500">
                                <h4 class="font-bold text-xs mb-2">💰 会計</h4>
                                <ul class="text-[10px] space-y-1">${rabbitData.operations.accounting.map(a => `<li>・${a}</li>`).join('')}</ul>
                            </div>
                        </div>`;
            } else if (tabId === 'rules') {
                html = `<h2 class="text-xl font-black text-center mb-6 text-blue-800">バレーのルール</h2>`;
                rabbitData.volleyballRules.forEach(r => {
                    html += `
                        <div class="bg-white p-5 rounded-3xl shadow-sm mb-4">
                            <p class="font-bold text-blue-700 text-sm mb-1">Q. ${r.q}</p>
                            <p class="text-sm text-slate-600">A. ${r.a}</p>
                        </div>`;
                });
            }

            container.innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 初期表示
        window.onload = () => showTab('kids');
    </script>
</body>
</html>
